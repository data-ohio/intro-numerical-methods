<figure class="listing figure-like"><figcaption><span class="type">Listing</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">A.2.5<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>mylowerleft<div class="autopermalink" data-description="Listing A.2.5: mylowerleft"><a href="#prg-mylowerleft" title="Copy heading and permalink for Listing A.2.5: mylowerleft" aria-label="Copy heading and permalink for Listing A.2.5: mylowerleft">🔗</a></div></figcaption><div class="listing__contents"><div class="code-box"><pre class="program clipboardable"><code class="language-matlab">function I = mylowerleft(f,a,b,c,d,m,n)
    % Computes an approximate integral of a function of two variables f(x,y).
    % Uses the lower-left corner to evaluate.
    % Inputs:
    %    a,b -- define the interval in x, namely a&lt;x&lt;b.
    %    c,d -- define the interval in y, namely c&lt;y&lt;d.
    %    m -- the number of (evenly spaced) intervals to use in x.
    %    n -- the number of (evenly spaced) intervals to use in y.
    % Output: The approximate value of the integral.
    %
    % Note: This program intentionally has a bug. Find and fix it.
    h = (b-a)/m;                            % step size in x direction
    k = (d-c)/n;                            % step size in y direction
    [X,Y] = meshgrid(a:h:b,c:k:d);          % sets up a grid
    Z=f(X,Y);
    mesh(X,Y,Z)                             % plot, just for fun
    S = sum(sum(Z(1:m,1:n)));
    I = S*h*k;
end
</code></pre></div></div>
