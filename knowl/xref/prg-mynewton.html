<figure class="listing figure-like"><figcaption><span class="type">Program</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">1.3.1<span class="period heading-divison-mark heading-divison-mark__period">.</span></span><span class="space heading-divison-mark heading-divison-mark__space"> </span>mynewton<div class="autopermalink" data-description="Program 1.3.1: mynewton"><a href="#prg-mynewton" title="Copy heading and permalink for Program 1.3.1: mynewton" aria-label="Copy heading and permalink for Program 1.3.1: mynewton">🔗</a></div></figcaption><div class="listing__contents"><div class="code-box"><pre class="program clipboardable"><code class="language-matlab">function x = mynewton(f,f1,x0,n)
    % Solves f(x) = 0 by doing n steps of Newton's method starting at x0.
    % Inputs: f -- the function
    %         f1 -- it's derivative
    %         x0 -- starting guess, a number
    %         n -- the number of steps to do
    % Output: x -- the approximate solution
    x = x0;                   % set x equal to the initial guess x0
    for i = 1:n               % Do n times
        x = x - f(x)/f1(x)    % Newton's formula, prints x too
    end
end
</code></pre></div></div>
